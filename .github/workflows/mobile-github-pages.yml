name: Mobile GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Mobile Team/**"
      - ".github/workflows/mobile-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mobile-github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mobile Team

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Mobile Team/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Ensure local env file exists
        run: |
          if [ ! -f ".env" ] && [ -f ".env.example" ]; then
            cp ".env.example" ".env"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build static export for GitHub Pages
        run: npm run web:export:pages

      - name: Prepare Pages artifact
        run: |
          touch dist/.nojekyll
          if [ -f "dist/+not-found.html" ]; then
            cp "dist/+not-found.html" "dist/404.html"
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: Mobile Team/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
